<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="i30 3D Control">
    <title>i30 3D DIGITAL REMOTE</title>

    <link rel="apple-touch-icon" href="./logo.png">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="shortcut icon" href="./logo.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
    <!-- Shtuar Three.js për 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3b30;
            --success: #34c759;
            --dash-bg: linear-gradient(135deg, rgba(20, 24, 33, 0.85), rgba(10, 12, 16, 0.95));
            --dash-border: rgba(0, 210, 255, 0.4);
            --dash-glow: rgba(0, 210, 255, 0.15);
        }

        body { 
            background-color: #0b0c10; 
            color: #fff; 
            font-family: '-apple-system', 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background-image: url('./bg.jpg');
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            background-attachment: fixed; 
            user-select: none;
            overflow-x: hidden;
        }

        .overlay { background: rgba(0, 0, 0, 0.6); min-height: 100vh; padding: 15px; padding-bottom: 80px; }
        
        .screen { display: none; text-align: center; max-width: 450px; margin: 0 auto; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #screen-login.active { display: flex; flex-direction: column; align-items: center; min-height: 85vh; }
        .logo-login { width: 120px; height: 120px; border-radius: 20%; margin-bottom: 20px; border: 2px solid var(--accent); object-fit: cover; box-shadow: 0 4px 15px var(--dash-glow); }
        #pin-input { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid var(--accent); color: white; font-size: 24px; padding: 15px; border-radius: 10px; width: 200px; text-align: center; margin-bottom: 20px; letter-spacing: 10px; outline: none;}
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 280px; margin-top: auto; margin-bottom: 20px; }
        .num-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; font-size: 22px; border-radius: 10px; cursor: pointer; transition: 0.2s;}
        .num-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }

        /* 3D CANVAS CONTAINER */
        #car-3d-container {
            width: 100%;
            height: 220px;
            background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(10,12,16,0.9) 80%);
            border: 2px solid var(--dash-border);
            border-radius: 16px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 15px var(--dash-glow);
            overflow: hidden;
        }

        /* HUD TELEMETRY OVERLAY (KU DUKET VOLTAZHI) */
        .hud-telemetry {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: var(--accent);
            text-shadow: 0 0 5px rgba(0,210,255,0.5);
            pointer-events: none;
            z-index: 10;
        }

        .hud-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .v-screen { 
            background: var(--dash-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--dash-border); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 15px; 
            text-align: left; 
            font-family: 'Courier New', Courier, monospace; 
            color: var(--accent); 
            font-size: 13px;
        }
        .v-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px;}
        .v-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .v-val { font-weight: bold; color: #fff; text-shadow: 0 0 8px var(--accent); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-full { grid-column: span 2; }
        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 12px 5px; font-size: 14px; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; backdrop-filter: blur(8px); }
        .btn span { font-size: 20px; margin-bottom: 3px; }
        .btn:active { transform: scale(0.95); }
        
        .b-start { background: linear-gradient(145deg, rgba(40,167,69,0.8), rgba(30,126,52,0.8)); } 
        .b-stop { background: linear-gradient(145deg, rgba(220,53,69,0.8), rgba(167,29,42,0.8)); } 
        .b-lock { background: linear-gradient(145deg, rgba(255,193,7,0.8), rgba(211,158,0,0.8)); color: #000; } 
        .b-unlock { background: linear-gradient(145deg, rgba(23,162,184,0.8), rgba(17,122,139,0.8)); } 
        .b-special { background: linear-gradient(145deg, rgba(111,66,193,0.8), rgba(85,48,152,0.8)); } 
        .b-blue { background: linear-gradient(145deg, rgba(0,123,255,0.8), rgba(0,86,179,0.8)); }
        .b-allclose { background: rgba(34,34,34,0.8); border: 1px solid rgba(255,255,255,0.2); }
        .b-gray { background: rgba(85,85,85,0.8); }

        .input-group { text-align: left; margin-bottom: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .input-group h3 { margin-top: 0; color: var(--accent); font-size: 15px; border-bottom: 1px solid var(--dash-border); padding-bottom: 5px; }
        .input-group label { display: block; font-size: 12px; color: #ddd; margin-top: 8px; }
        input[type="text"], input[type="number"], input[type="password"], select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: rgba(0,0,0,0.7); color: #fff; font-size: 14px; margin-top: 5px; outline: none; box-sizing: border-box;}

        .nav-bar { display: none; justify-content: space-around; background: rgba(10,12,16,0.95); padding: 12px 0; border-top: 1px solid var(--dash-border); position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; backdrop-filter: blur(15px); }
        .nav-icon { font-size: 24px; cursor: pointer; color: #777; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .nav-icon span { font-size: 9px; margin-top: 2px; font-weight: bold; }
        .nav-icon.active { color: var(--accent); transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; }
        th, td { padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { color: var(--accent); }
        .guest-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 6px; margin-bottom: 5px; }
        .btn-delete { background: var(--danger); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay">
        
        <!-- EKRANI LOGIN -->
        <div id="screen-login" class="screen active">
            <h2 style="margin-top: 20px; letter-spacing: 2px; color: #fff;">i30 <span style="color: var(--accent);">3D REMOTE</span></h2>
            <div style="margin-top: 10px; font-family: 'Brush Script MT', cursive; font-size: 1.2rem; color: #aaa;">
                Created by <span style="color: var(--accent);">Aglien</span>
            </div>
            <img id="login-logo-img" src="./logo.png" class="logo-login">
            <input type="password" id="pin-input" readonly placeholder="****">
            
            <div class="numpad">
                <button class="num-btn" onclick="addPin('1')">1</button><button class="num-btn" onclick="addPin('2')">2</button><button class="num-btn" onclick="addPin('3')">3</button>
                <button class="num-btn" onclick="addPin('4')">4</button><button class="num-btn" onclick="addPin('5')">5</button><button class="num-btn" onclick="addPin('6')">6</button>
                <button class="num-btn" onclick="addPin('7')">7</button><button class="num-btn" onclick="addPin('8')">8</button><button class="num-btn" onclick="addPin('9')">9</button>
                <button class="num-btn" style="color: var(--danger);" onclick="clearPin()">C</button><button class="num-btn" onclick="addPin('0')">0</button><button class="num-btn" style="color: var(--accent);" onclick="checkLogin()">OK</button>
            </div>
        </div>

        <!-- EKRANI DASHBOARD ME 3D -->
        <div id="screen-dash" class="screen">
            <h2 style="margin-bottom: 10px; color: #fff; font-size: 18px;">PULTI 3D I MAKINËS <br><span id="user-greeting" style="font-size:12px; font-weight:normal;"></span></h2>
            
            <!-- 3D CAR CONTAINER & HUD TELEMETRY -->
            <div id="car-3d-container">
                <div class="hud-telemetry">
                    <div class="hud-card">Bateria: <span id="hud-battery" style="color:#fff;">--.-V</span></div>
                    <div class="hud-card">Rrjeti: <span id="hud-online" style="color:orange;">Duke u lidhur...</span></div>
                </div>
            </div>

            <!-- MINI DASHBOARD STATUS -->
            <div class="v-screen">
                <div class="v-row"><span>Statusi i Motorrit:</span> <span class="v-val" id="val-engine">--</span></div>
                <div class="v-row"><span>Statusi i Dyerve:</span> <span class="v-val" id="val-locks">--</span></div>
                <div class="v-row" id="row-hours1"><span>Orët Sot / Totale:</span> <span class="v-val" id="val-hours-today">0.0h</span></div>
            </div>

            <div class="btn-grid">
                <button id="btn-engine" class="btn b-start btn-full" onclick="sendCommand('START')"><span>⚡</span> NDIZ MOTORRIN</button>
                <button id="btn-locks" class="btn b-unlock btn-full" onclick="sendCommand('UNLOCK')"><span>🔓</span> SHKYÇ DYERT</button>
                
                <button class="btn b-special" id="btn-sunroof" onclick="sendCommand('SUNROOF')"><span>🪟</span> TAVANI</button>
                <button class="btn b-special" id="btn-windows" onclick="sendCommand('WINDOWS')"><span>🪟</span> XHAMAT</button>
                
                <button class="btn b-blue" id="btn-trip" onclick="sendCommand('TRIP_MODE')"><span>🚀</span> UDHËTIM</button>
                <button class="btn b-blue" id="btn-gps" onclick="sendCommand('GPS')"><span>📍</span> GPS</button>
                
                <button class="btn b-allclose btn-full" id="btn-allclose" onclick="if(confirm('A je i sigurt?')) { sendCommand('ALL_CLOSE'); }"><span>🛡️</span> MBYLLJE TOTALE</button>
                <button id="btn-key" class="btn b-gray btn-full" onclick="toggleKey()"><span>🚫</span> ÇELËSI SERVISIT: JO AKTIV</button>
            </div>
        </div>

        <!-- EKRANI CILËSIME & SERVISE -->
        <div id="screen-serv" class="screen">
            <h2 style="margin-bottom: 15px; color: #fff;">SISTEMI & SERVISET</h2>
            
            <div class="input-group">
                <h3>👥 SHTO PËRDORUES</h3>
                <input type="text" id="new-guest-name" placeholder="Emri (p.sh. Vëllai)">
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <input type="number" id="new-guest-pin" placeholder="PIN (****)" style="width:60%; margin:0;">
                    <button class="btn b-start" style="width:40%; padding:8px; margin:0; flex-direction:row;" onclick="addGuestPin()">➕ SHTO</button>
                </div>
                <div id="guest-list" style="margin-top:10px;"></div>
            </div>

            <div class="input-group">
                <h3>⚙️ KOHËT E MAKINËS</h3>
                <label>Koha e Kandeleve (ms):</label>
                <input type="number" id="cfg-t-kandele" placeholder="p.sh. 3000">
                <label>Koha e Xhamave (ms):</label>
                <input type="number" id="cfg-t-xhamat" placeholder="p.sh. 4500">
                <button class="btn b-special" style="margin-top:10px; padding:10px;" onclick="ruajKohet()">📡 DËRGO NË MAKINË</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION BAR -->
    <div class="nav-bar" id="navbar">
        <div class="nav-icon active" onclick="switchTab('screen-dash', this)">
            🚘<span>PULTI 3D</span>
        </div>
        <div class="nav-icon" id="nav-serv" onclick="switchTab('screen-serv', this)">
            📓<span>SERVISET</span>
        </div>
        <div class="nav-icon" onclick="window.location.reload()">
            🔄<span>REFRESH</span>
        </div>
        <div class="nav-icon" style="color: var(--danger);" onclick="logout()">
            🚪<span>DIL</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB5vAdwGuUd7oFjhxsyhuUSH84TXXSbtQo",
            authDomain: "ab592no.firebaseapp.com",
            databaseURL: "https://ab592no-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ab592no",
            storageBucket: "ab592no.firebasestorage.app",
            messagingSenderId: "900777917500",
            appId: "1:900777917500:web:e9b29ed2d1eb2dc2c8d739"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const topicCmd = "jon_i30_S3kr3t_998877/komanda";
        const topicStatus = "jon_i30_S3kr3t_998877/statusi";
        const mqttClient = new Paho.Client("broker.hivemq.com", 8884, "App_" + Math.random().toString(16).slice(2, 8));

        let carTimer, isMqttConnected = false, isEngineRunning = false, userRole = "guest", pinEntry = "";
        
        // --- THREE.JS 3D CAR SETUP ---
        let scene, camera, renderer, carMesh, wheels = [];

        function init3DCar() {
            const container = document.getElementById('car-3d-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 4, 7);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Drita
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0x00d2ff, 1.2);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Krijimi i modelit 3D të makinës (Stilizuar si Hatchback)
            const carGroup = new THREE.Group();

            // Trupi kryesor
            const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 3.8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, metalness: 0.8, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            carGroup.add(body);

            // Kabina (pjesa e sipërme)
            const cabinGeo = new THREE.BoxGeometry(1.5, 0.5, 2.0);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x050508, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.8 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.85, -0.2);
            carGroup.add(cabin);

            // Rrotat
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const wheelPositions = [
                [-1.0, 0.35, 1.2], [1.0, 0.35, 1.2],
                [-1.0, 0.35, -1.2], [1.0, 0.35, -1.2]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                carGroup.add(wheel);
                wheels.push(wheel);
            });

            scene.add(carGroup);
            carMesh = carGroup;

            // Animacioni dhe renderimi 3D
            function animate() {
                requestAnimationFrame(animate);
                if (carMesh) {
                    carMesh.rotation.y += 0.005; // Rrotullim i lehtë elegant
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        function addPin(num) {
            if(pinEntry.length < 4) { pinEntry += num; document.getElementById('pin-input').value = pinEntry; }
        }
        function clearPin() { pinEntry = ""; document.getElementById('pin-input').value = ""; }

        function checkLogin() {
            if(pinEntry.length < 1) return;
            db.ref('adminConfig/password').once('value').then((snapAdmin) => {
                if (String(pinEntry) === String(snapAdmin.val())) {
                    sessionStorage.setItem("isAuth", "true"); sessionStorage.setItem("role", "admin"); showApp();
                } else {
                    db.ref('guestUsers/' + pinEntry).once('value').then((snapGuest) => {
                        if (snapGuest.exists()) {
                            sessionStorage.setItem("isAuth", "true"); sessionStorage.setItem("role", "guest");
                            sessionStorage.setItem("guestName", snapGuest.val() || "Përdorues"); showApp();
                        } else { alert("PIN i gabuar!"); clearPin(); }
                    });
                }
            });
        }

        function showApp() {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
            document.getElementById('navbar').style.display = 'flex';
            userRole = sessionStorage.getItem("role");

            if (userRole === "guest") {
                document.getElementById('row-hours1').style.display = 'none';
                document.getElementById('nav-serv').style.display = 'none';
                document.getElementById('user-greeting').innerText = `👋 ${sessionStorage.getItem("guestName").toUpperCase()}`;
            } else {
                document.getElementById('user-greeting').innerText = `👋 AGLIEN (ADMIN)`;
            }

            init3DCar();
            initMQTT();
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        function switchTab(screenId, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(screenId).classList.add('active'); el.classList.add('active');
        }

        function initMQTT() {
            if (isMqttConnected) return; 
            mqttClient.connect({
                useSSL: true, cleanSession: true, reconnect: true, timeout: 3, keepAliveInterval: 30,
                onSuccess: () => {
                    isMqttConnected = true; mqttClient.subscribe(topicStatus);
                    document.getElementById('hud-online').innerText = "ONLINE"; document.getElementById('hud-online').style.color = "var(--success)";
                    pingCar();
                },
                onFailure: () => { isMqttConnected = false; setTimeout(initMQTT, 3000); }
            });
        }

        mqttClient.onMessageArrived = (msg) => {
            clearTimeout(carTimer);
            document.getElementById('hud-online').innerText = "ONLINE"; document.getElementById('hud-online').style.color = "var(--success)";
            
            try {
                const data = JSON.parse(msg.payloadString);
                
                // Këtu shfaqet Voltazhi te HUD 3D
                if(data.v !== undefined) {
                    const elBat = document.getElementById('hud-battery');
                    elBat.innerText = data.v.toFixed(2) + "V"; 
                    elBat.style.color = (data.v > 12.0) ? "#fff" : "var(--danger)";
                }

                if(data.e !== undefined) {
                    const elEng = document.getElementById('val-engine'); const btnEng = document.getElementById('btn-engine');
                    if(data.e === 1) {
                        elEng.innerText = "Ndezur"; elEng.style.color = "var(--success)";
                        btnEng.className = "btn b-stop btn-full"; btnEng.innerHTML = "<span>🛑</span> FIK MOTORRIN"; btnEng.onclick = () => sendCommand("STOP");
                        if(carMesh) carMesh.children[0].material.color.setHex(0x28a745); // Ndryshon ngjyrën e 3D në jeshile kur ndizet
                    } else {
                        elEng.innerText = "Fikur"; elEng.style.color = "#fff";
                        btnEng.className = "btn b-start btn-full"; btnEng.innerHTML = "<span>⚡</span> NDIZ MOTORRIN"; btnEng.onclick = () => sendCommand("START");
                        if(carMesh) carMesh.children[0].material.color.setHex(0x1a1a24); 
                    }
                }

                if(data.l !== undefined) {
                    const elLocks = document.getElementById('val-locks'); const btnLocks = document.getElementById('btn-locks');
                    if(data.l === 1) {
                        elLocks.innerText = "Mbyllur"; elLocks.style.color = "#fff";
                        btnLocks.className = "btn b-unlock btn-full"; btnLocks.innerHTML = "<span>🔓</span> SHKYÇ DYERT"; btnLocks.onclick = () => sendCommand("UNLOCK");
                    } else {
                        elLocks.innerText = "HAPUR (!)"; elLocks.style.color = "var(--danger)";
                        btnLocks.className = "btn b-lock btn-full"; btnLocks.innerHTML = "<span>🔒</span> MBYLL DYERT"; btnLocks.onclick = () => sendCommand("LOCK");
                    }
                }
            } catch (e) {}
        };

        window.sendCommand = (cmd) => {
            try { 
                const message = new Paho.Message(cmd); 
                message.destinationName = topicCmd; 
                message.qos = 0; message.retained = false;
                mqttClient.send(message);
            } catch (error) { alert("Lidhja po rikthehet..."); }
        };

        function pingCar() {
            try { 
                const msg = new Paho.Message("REFRESH"); msg.destinationName = topicCmd; msg.qos = 0; msg.retained = false;
                mqttClient.send(msg); 
            } catch(e) {}
            carTimer = setTimeout(() => { document.getElementById('hud-online').innerText = "OFFLINE"; document.getElementById('hud-online').style.color = "var(--danger)"; }, 12000); 
        }

        window.onload = () => { if (sessionStorage.getItem("isAuth")) showApp(); };
    </script>
</body>
</html>
